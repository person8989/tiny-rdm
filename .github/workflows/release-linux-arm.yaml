name: Release Linux ARM Deb
run-name: ${{ github.event.release.tag_name || github.event.inputs.tag }}

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag"
        required: true
        default: "1.0.0"

jobs:
  release:
    name: Release Linux ARM64 Deb
    runs-on: ubuntu-24.04-arm

    env:
      PLATFORM: linux/arm64
      DEB_ARCH: arm64
      APP_NAME: tiny-rdm
      PKG_NAME: tiny-rdm

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Normalise version tag
        id: normalise_version
        shell: bash
        run: |
          if [ -z "${{ github.event.release.tag_name }}" ]; then
            version=$(echo "${{ github.event.inputs.tag }}" | sed -e 's/^v//g')
          else
            version=$(echo "${{ github.event.release.tag_name }}" | sed -e 's/^v//g')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Ubuntu prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend assets
        shell: bash
        run: |
          npm install -g npm@9
          jq '.info.productVersion = "${{ steps.normalise_version.outputs.version }}"' wails.json > tmp.json
          mv tmp.json wails.json

          cd frontend
          jq '.version = "${{ steps.normalise_version.outputs.version }}"' package.json > tmp.json
          mv tmp.json package.json
          npm install

      - name: Build Wails app for Linux ARM64
        shell: bash
        run: |
          CGO_ENABLED=1 wails build -platform ${PLATFORM} -tags webkit2_41 \
            -ldflags "-X main.version=v${{ steps.normalise_version.outputs.version }} -X main.gaMeasurementID=${{ secrets.GA_MEASUREMENT_ID }} -X main.gaSecretKey=${{ secrets.LINUX_GA_SECRET }}" \
            -o ${APP_NAME}

      - name: Create deb layout
        shell: bash
        run: |
          VERSION="${{ steps.normalise_version.outputs.version }}"
          PKG_DIR="dist/${PKG_NAME}_${VERSION}_${DEB_ARCH}"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/local/bin"
          mkdir -p "${PKG_DIR}/usr/share/applications"
          mkdir -p "${PKG_DIR}/usr/share/icons/hicolor/512x512/apps"

          cp build/bin/${APP_NAME} "${PKG_DIR}/usr/local/bin/${APP_NAME}"
          chmod 755 "${PKG_DIR}/usr/local/bin/${APP_NAME}"

          if [ -f build/appicon.png ]; then
            cp build/appicon.png "${PKG_DIR}/usr/share/icons/hicolor/512x512/apps/${APP_NAME}.png"
          fi

          cat > "${PKG_DIR}/DEBIAN/control" <<EOF
          Package: ${PKG_NAME}
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${DEB_ARCH}
          Maintainer: $(jq -r '.author.name' wails.json) <$(jq -r '.author.email' wails.json)>
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0
          Description: $(jq -r '.info.comments' wails.json)
          EOF

          cat > "${PKG_DIR}/usr/share/applications/${APP_NAME}.desktop" <<EOF
          [Desktop Entry]
          Name=$(jq -r '.info.productName' wails.json)
          Comment=$(jq -r '.info.comments' wails.json)
          Exec=/usr/local/bin/${APP_NAME}
          Icon=${APP_NAME}
          Terminal=false
          Type=Application
          Categories=Development;
          EOF

      - name: Build deb
        shell: bash
        run: |
          VERSION="${{ steps.normalise_version.outputs.version }}"
          PKG_DIR="dist/${PKG_NAME}_${VERSION}_${DEB_ARCH}"
          dpkg-deb --build -Zxz "${PKG_DIR}"

      - name: Rename deb
        shell: bash
        run: |
          VERSION="${{ steps.normalise_version.outputs.version }}"
          mv "dist/${PKG_NAME}_${VERSION}_${DEB_ARCH}.deb" \
             "dist/${PKG_NAME}_${VERSION}_linux_arm64.deb"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.normalise_version.outputs.version }}
          files: |
            dist/${{ env.PKG_NAME }}_${{ steps.normalise_version.outputs.version }}_linux_arm64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
